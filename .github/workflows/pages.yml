name: Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Inject
        env:
          AC5412: ${{ secrets.AC5412 }}
          B19677: ${{ secrets.B19677 }}
        run: |
          python3 -c "
          import sys, os, pathlib
          pairs = [('AC5412', '<!-- 14ce3f1f74c4e810f6773e7c2ef8d3c0 -->'), ('B19677', '<!-- 9ac09aa6288c491c408b7a0f6bf1 -->')]
          path = pathlib.Path('index.html')
          data = path.read_text(encoding='utf-8')
          result = data
          for key, mark in pairs:
              token = os.environ.get(key, '')
              if token:
                  result = result.replace(mark, token)
          if result == data and any(os.environ.get(k, '') for k, _ in pairs):
              sys.exit(1)
          if result != data:
              path.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
